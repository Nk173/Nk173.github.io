<svg xmlns="http://www.w3.org/2000/svg" width="560" height="380" viewBox="0 0 560 380" role="img" aria-label="Rotational invariance of Atiyah's configuration of points in two dimensions">
  <defs>
    <marker id="arrB" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f6df6"/>
    </marker>
    <marker id="arrG" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f9d57"/>
    </marker>
  </defs>

  <rect width="560" height="380" fill="#ffffff"/>

  <!-- title -->
  <text x="28" y="34" font-family="-apple-system, Segoe UI, sans-serif" font-size="17" font-weight="700" fill="#1b2230">Atiyah's configuration of points</text>
  <text x="28" y="54" font-family="-apple-system, Segoe UI, sans-serif" font-size="13.5" fill="#8b949e">Rotational invariance in 2-D</text>

  <!-- ── Left: original (blue) and rotated (green) configurations ── -->
  <!-- original triangle -->
  <path d="M290,165 L220,280 L105,210 Z" fill="rgba(47,109,246,0.07)" stroke="#2f6df6" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="290" cy="165" r="5" fill="#2f6df6"/>
  <circle cx="220" cy="280" r="5" fill="#2f6df6"/>
  <circle cx="105" cy="210" r="5" fill="#2f6df6"/>

  <!-- rotated-by-theta triangle -->
  <path d="M282,228 L154,271 L111,143 Z" fill="none" stroke="#1f9d57" stroke-width="2.5" stroke-dasharray="6 4" stroke-linejoin="round"/>
  <circle cx="282" cy="228" r="5" fill="#1f9d57"/>
  <circle cx="154" cy="271" r="5" fill="#1f9d57"/>
  <circle cx="111" cy="143" r="5" fill="#1f9d57"/>

  <!-- centre of rotation -->
  <circle cx="200" cy="185" r="2.5" fill="#1b2230"/>
  <!-- rotation arc from a vertex to its image -->
  <path d="M290,165 A 92 92 0 0 1 282,228" fill="none" stroke="#1b2230" stroke-width="1.6" marker-end="url(#arrB)"/>
  <text x="312" y="200" font-family="-apple-system, Segoe UI, sans-serif" font-size="16" font-style="italic" fill="#1b2230">θ</text>

  <!-- ── Right: unit-circle / Riemann-sphere directions, z -> e^{iθ}z ── -->
  <text x="455" y="74" font-family="-apple-system, Segoe UI, sans-serif" font-size="11.5" fill="#8b949e" text-anchor="middle">directions on CP¹ ≅ S¹</text>
  <line x1="392" y1="150" x2="518" y2="150" stroke="#d7dce2" stroke-width="1"/>
  <line x1="455" y1="88" x2="455" y2="212" stroke="#d7dce2" stroke-width="1"/>
  <circle cx="455" cy="150" r="60" fill="none" stroke="#9aa3ad" stroke-width="1.5"/>

  <!-- original direction z -->
  <line x1="455" y1="150" x2="509" y2="125" stroke="#2f6df6" stroke-width="2"/>
  <circle cx="509" cy="125" r="4.5" fill="#2f6df6"/>
  <text x="515" y="121" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" font-style="italic" fill="#2f6df6">z</text>
  <!-- rotated direction e^{iθ}z -->
  <line x1="455" y1="150" x2="480" y2="96" stroke="#1f9d57" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="480" cy="96" r="4.5" fill="#1f9d57"/>
  <!-- rotation arc on the circle -->
  <path d="M501,128 A 56 56 0 0 0 485,99" fill="none" stroke="#1b2230" stroke-width="1.4" marker-end="url(#arrG)"/>
  <text x="505" y="104" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-style="italic" fill="#1b2230">θ</text>

  <text x="455" y="232" font-family="-apple-system, Segoe UI, sans-serif" font-size="14.5" fill="#1b2230" text-anchor="middle">z ↦ e<tspan dy="-6" font-size="10" font-style="italic">iθ</tspan><tspan dy="6" font-style="italic">z</tspan></text>

  <!-- ── bottom caption ── -->
  <text x="280" y="306" font-family="-apple-system, Segoe UI, sans-serif" font-size="13.5" fill="#3a4250" text-anchor="middle">Rotating the configuration by θ rotates every inter-point direction equally,</text>
  <text x="280" y="326" font-family="-apple-system, Segoe UI, sans-serif" font-size="13.5" fill="#3a4250" text-anchor="middle">so the determinant of the polynomials <tspan font-style="italic">p</tspan><tspan dy="3" font-size="10">1</tspan><tspan dy="-3">,…,</tspan><tspan font-style="italic">p</tspan><tspan dy="3" font-size="10">n</tspan><tspan dy="-3" xml:space="preserve">&#160;is left invariant.</tspan></text>
</svg>
